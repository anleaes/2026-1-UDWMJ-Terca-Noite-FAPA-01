{% extends 'base.html' %}

{% block title %}
  Lista de Cids - {{ block.super }}
{% endblock %}

{% block body %}
  <br />
  <b>Lista de Cids</b>
  <br />
  <br />
  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descricao</th>
      </tr>
    </thead>
    <tbody>
      {% for cid in cids %}
        <tr>
          <th>{{ cid.id }}</th>
          <td>{{ cid.name }}</td>
          <td>{{ cid.description }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
